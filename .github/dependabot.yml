version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    target-branch: dev
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
    cooldown:
      default-days: 5
    groups:
      actions:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]
      actions-security:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /
    target-branch: dev
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    cooldown:
      default-days: 5
    groups:
      card-deps:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]
      npm-security:
        applies-to: security-updates
        patterns: ["*"]
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
