name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          # plugin = Lovelace frontend resource (this repo).
          # Use 'integration' for HA Python integrations.
          category: plugin

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Guard against backticks inside Lit css/html templates
        # Stray ` inside a css`...` or html`...` tagged template
        # terminates the literal early; the rest then parses as JS.
        # Build still succeeds (the bundle is valid JS) but the card
        # crashes at module load. Cheap CI guard before the slow tsc.
        run: |
          if perl -0777 -ne '
            while (m{(css|html)\`(.*?)(?<!\\)\`}gs) {
              my ($tag, $body) = ($1, $2);
              if ($body =~ /\`/) {
                print "Stray backtick inside ${tag}\`...\` template\n";
                print "Surrounding text:\n";
                print substr($body, 0, 240), "\n...\n";
                exit 1;
              }
            }
            exit 0;
          ' src/*.ts src/**/*.ts; then
            echo "OK: no stray backticks in tagged templates"
          else
            echo "::error::A backtick inside a Lit css/html template will" \
              "terminate the literal early and silently break the card." \
              "Use single quotes, double quotes, or word descriptions in" \
              "comments and class-name references."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Audit production deps
        # --omit=dev keeps the gate enforceable; without it Rollup-plugin
        # advisories (which never ship to users) flood the report.
        run: npm audit --omit=dev --audit-level=high

      - name: Type-check (strict)
        # Rollup's @rollup/plugin-typescript is more permissive than tsc
        # in strict mode. Run tsc separately so TS regressions surface
        # in CI instead of slipping into the bundle.
        run: npx tsc --noEmit

      - name: Build bundle
        run: npm run build

      - name: Syntax-check bundle
        # `node -c` parses without executing — cheapest check that
        # Rollup didn't produce malformed JS.
        run: node -c dist/spinning-wheel-card.js
