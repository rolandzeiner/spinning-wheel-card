<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" role="img" aria-label="Spinning wheel preview">
  <g transform="translate(160 160)">
    <!-- 8 segments, 12 o'clock = top, going clockwise -->
    <path d="M 0,0 L 0,-140 A 140,140 0 0,1 99,-99 Z" fill="#e63946"/>
    <path d="M 0,0 L 99,-99 A 140,140 0 0,1 140,0 Z" fill="#f4a261"/>
    <path d="M 0,0 L 140,0 A 140,140 0 0,1 99,99 Z" fill="#e9c46a"/>
    <path d="M 0,0 L 99,99 A 140,140 0 0,1 0,140 Z" fill="#a8dadc"/>
    <path d="M 0,0 L 0,140 A 140,140 0 0,1 -99,99 Z" fill="#457b9d"/>
    <path d="M 0,0 L -99,99 A 140,140 0 0,1 -140,0 Z" fill="#1d3557"/>
    <path d="M 0,0 L -140,0 A 140,140 0 0,1 -99,-99 Z" fill="#9b5de5"/>
    <path d="M 0,0 L -99,-99 A 140,140 0 0,1 0,-140 Z" fill="#06d6a0"/>

    <!-- Segment dividers (drawn as a single ring stroke to keep the file small) -->
    <circle r="140" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="0"/>

    <!-- Outer rim -->
    <circle r="140" fill="none" stroke="rgba(0,0,0,0.6)" stroke-width="3"/>

    <!-- Hub (HA --primary-color blue) -->
    <circle r="30" fill="#03a9f4" stroke="rgba(0,0,0,0.45)" stroke-width="2"/>
    <text x="0" y="0" font-family="ui-sans-serif,system-ui,sans-serif" font-weight="700" font-size="14"
          fill="#ffffff" text-anchor="middle" dominant-baseline="central">SPIN</text>
  </g>

  <!-- Pointer at top, apex pointing DOWN into the wheel -->
  <polygon points="160,30 144,4 176,4" fill="#03a9f4"/>
</svg>
